x-shard-base: &shard-base
  # 使用 Docker 默认网桥网络，通过 extra_hosts 解析宿主机
  extra_hosts:
    - "host.docker.internal:host-gateway"
  command: python main.py
  environment:
    - HTTP_PROXY=http://host.docker.internal:7897
    - HTTPS_PROXY=http://host.docker.internal:7897
    - CAMOUFOX_PROXY=http://host.docker.internal:7897

services:
  aistudio-shard-0:
    <<: *shard-base

  aistudio-shard-1:
    <<: *shard-base
