x-shard-base: &shard-base
  # 双轨拓扑: 浏览器公网流量→Clash(7897)，WS内部流量→socat→moe-cli-proxy-api(8317)
  extra_hosts:
    - "host.docker.internal:host-gateway"
  command: python main.py
  environment:
    # 浏览器公网代理 (访问 ai.studio 等外网)
    - HTTP_PROXY=http://host.docker.internal:7897
    - HTTPS_PROXY=http://host.docker.internal:7897
    - CAMOUFOX_PROXY=http://host.docker.internal:7897
    # 关键: 127.0.0.1 的 WebSocket 流量不经过代理，由 socat 直接转发到 cli-proxy-api
    - NO_PROXY=127.0.0.1,localhost,host.docker.internal,moe-cli-proxy-api
  networks:
    - moe-infrastructure-network

services:
  aistudio-shard-0:
    <<: *shard-base

  aistudio-shard-1:
    <<: *shard-base

networks:
  moe-infrastructure-network:
    external: true
